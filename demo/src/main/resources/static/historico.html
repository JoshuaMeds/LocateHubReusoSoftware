<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Histórico de Aluguéis - LocateHub</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            align-items: flex-start;
        }

        .container-main {
            max-width: 820px;
        }

        .history-list {
            display: grid;
            gap: 16px;
            margin-top: 18px;
        }

        .history-item {
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 16px;
            display: grid;
            gap: 10px;
            background: #ffffff;
            transition: border-color 0.2s;
        }

        .history-item:hover {
            border-color: #6366F1;
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            align-items: flex-start;
        }

        .history-title {
            color: #1e293b;
            font-weight: 800;
            font-size: 1.1rem;
            margin-bottom: 4px;
        }

        .history-meta {
            color: #64748b;
            font-size: 14px;
        }

        /* Cores das Badges de Status */
        .badge {
            border-radius: 999px;
            padding: 5px 10px;
            font-size: 12px;
            font-weight: 700;
            white-space: nowrap;
        }
        .badge-pendente { background: #fef3c7; color: #92400e; }
        .badge-ativo { background: #dbeafe; color: #1e40af; }
        .badge-concluido { background: #dcfce7; color: #166534; }
        .badge-cancelado { background: #fee2e2; color: #991b1b; }

        .evaluation-form {
            margin-top: 12px;
            padding-top: 16px;
            border-top: 1px dashed #cbd5e1;
            display: none;
            animation: fadeIn 0.3s ease-out;
        }

        .empty {
            color: #64748b;
            padding: 40px 0;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="container-main">
    <div class="card">
        <div class="page-header">
            <h1>Histórico de Aluguéis</h1>
            <p>Acompanhe suas locações e avalie os itens devolvidos</p>
        </div>

        <div id="lista" class="history-list">
            <p class="empty">Carregando seu histórico...</p>
        </div>

        <button onclick="window.location.href='home.html'" class="btn btn-secondary" type="button" style="margin-top: 20px;">
            Voltar para o Início
        </button>

        <p id="messageGeral" class="alert" style="display:none;"></p>
    </div>
</div>

<script>
    const lista = document.getElementById("lista");
    const money = new Intl.NumberFormat("pt-BR", { style: "currency", currency: "BRL" });

    function formatarData(dataISO) {
        const [ano, mes, dia] = dataISO.split('-');
        return `${dia}/${mes}/${ano}`;
    }

    async function carregarHistorico() {
        try {
            // Reutilizando a rota de reservas do outro desenvolvedor
            const response = await fetch("/reservas/minhas", { credentials: "include" });

            if (!response.ok) {
                if (response.status === 403) {
                    window.location.href = "login.html";
                    return;
                }
                throw new Error(await response.text());
            }

            const reservas = await response.json();
            renderHistorico(reservas);
        } catch (error) {
            lista.innerHTML = "";
            document.getElementById("messageGeral").innerText = "Erro ao carregar histórico: " + error.message;
            document.getElementById("messageGeral").className = "alert alert-error";
            document.getElementById("messageGeral").style.display = "block";
        }
    }

    function renderHistorico(reservas) {
        lista.innerHTML = "";

        if (reservas.length === 0) {
            lista.innerHTML = "<p class='empty'>Você ainda não possui nenhum item no histórico.</p>";
            return;
        }

        reservas.forEach((reserva) => {
            const item = document.createElement("div");
            item.className = "history-item";

            // Status no novo sistema: "Cancelada", "Futura", "Em andamento", "Finalizada"
            let classeCor = "badge-pendente"; // default
            if (reserva.status === "Em andamento") classeCor = "badge-ativo";
            if (reserva.status === "Finalizada") classeCor = "badge-concluido";
            if (reserva.status === "Cancelada") classeCor = "badge-cancelado";
            
            let htmlAvaliacao = "";
            if (reserva.status === "Finalizada") {
                htmlAvaliacao = `
                    <button class="btn btn-secondary" style="margin-top: 10px; width: fit-content; padding: 8px 16px; font-size: 13px;" onclick="toggleAvaliacao(${reserva.id})">
                        ★ Avaliar Reserva
                    </button>

                    <div id="form-aval-${reserva.id}" class="evaluation-form">
                        <div class="form-group">
                            <label>Nota (1 a 5)</label>
                            <select id="nota-${reserva.id}" class="form-input">
                                <option value="5">5 - Excelente</option>
                                <option value="4">4 - Muito Bom</option>
                                <option value="3">3 - Bom</option>
                                <option value="2">2 - Ruim</option>
                                <option value="1">1 - Péssimo</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Comentário</label>
                            <textarea id="comentario-${reserva.id}" placeholder="Conte como foi sua experiência..."></textarea>
                        </div>
                        <button class="btn btn-primary" onclick="enviarAvaliacao(${reserva.id}, this)">Enviar Avaliação</button>
                        <p id="msg-aval-${reserva.id}" class="alert" style="display:none;"></p>
                    </div>
                `;
            }

            item.innerHTML = `
                <div class="history-header">
                    <div>
                        <div class="history-title">${reserva.produto}</div>
                        <div class="history-meta">Período: ${formatarData(reserva.dataInicio)} a ${formatarData(reserva.dataFim)}</div>
                        <div class="history-meta" style="font-weight: 600; margin-top: 4px; color: #1e293b;">
                            Valor Total: ${money.format(reserva.valorTotal)}
                        </div>
                    </div>
                    <span class="badge ${classeCor}">${reserva.status}</span>
                </div>
                ${htmlAvaliacao}
            `;

            lista.appendChild(item);
        });
    }

    function toggleAvaliacao(id) {
        const form = document.getElementById(`form-aval-${id}`);
        form.style.display = form.style.display === "block" ? "none" : "block";
    }

    async function enviarAvaliacao(id, btnElement) {
        const nota = document.getElementById(`nota-${id}`).value;
        const comentario = document.getElementById(`comentario-${id}`).value;
        const msgBox = document.getElementById(`msg-aval-${id}`);

        btnElement.classList.add("loading");
        btnElement.innerText = "Enviando...";
        msgBox.style.display = "none";

        try {
            // Nova rota de avaliação adaptada
            const response = await fetch(`/avaliacoes/${id}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                credentials: "include",
                body: JSON.stringify({ nota: parseInt(nota), comentario: comentario })
            });

            if (response.ok) {
                msgBox.innerText = "Avaliação enviada com sucesso!";
                msgBox.className = "alert alert-success";
                msgBox.style.display = "block";
                btnElement.style.display = "none"; 
            } else {
                const erro = await response.text();
                msgBox.innerText = erro;
                msgBox.className = "alert alert-error";
                msgBox.style.display = "block";
            }
        } catch (err) {
            msgBox.innerText = "Erro ao conectar com o servidor.";
            msgBox.className = "alert alert-error";
            msgBox.style.display = "block";
        } finally {
            btnElement.classList.remove("loading");
            if (btnElement.style.display !== "none") btnElement.innerText = "Enviar Avaliação";
        }
    }

    carregarHistorico();
</script>
</body>
</html>
