<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - LocateHub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container-main">
        <div class="card">
            <div class="page-header">
                <h1>Página Inicial</h1>
                <p id="welcome">Carregando...</p>
            </div>

            <div class="alert alert-success">
                Sessão verificada com sucesso.
            </div>

            <button onclick="logout()" class="btn btn-secondary" style="margin-top: 20px;">
                Sair da Conta
            </button>
        </div>
    </div>

    <script>
        async function checkSession() {
            const response = await fetch("/session", {
                method: "GET",
                credentials: "include"
            });

            if (!response.ok) {
                window.location.href = "index.html";
            } else {
                // Opcional: define um texto padrão se a sessão estiver ok
                document.getElementById("welcome").innerText = "Bem-vindo ao LocateHub";
            }
        }

        async function logout() {
            await fetch("/logout", {
                method: "POST",
                credentials: "include"
            });

            window.location.href = "/";
        }

        checkSession();
    </script>
</body>
</html>
