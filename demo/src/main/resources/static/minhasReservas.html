<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minhas Reservas - LocateHub</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            align-items: flex-start;
        }

        .container-main {
            max-width: 860px;
        }

        .reservation-list {
            display: grid;
            gap: 12px;
            margin-top: 18px;
        }

        .reservation-item {
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 16px;
            display: grid;
            gap: 10px;
        }

        .reservation-header {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            align-items: flex-start;
        }

        .reservation-title {
            color: #1e293b;
            font-weight: 800;
            font-size: 1rem;
        }

        .reservation-meta {
            color: #64748b;
            font-size: 14px;
        }

        .badge {
            border-radius: 999px;
            padding: 5px 9px;
            font-size: 12px;
            font-weight: 700;
            background: #f1f5f9;
            color: #475569;
            white-space: nowrap;
        }

        .empty {
            color: #64748b;
            padding: 20px 0;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="container-main">
    <div class="card">
        <div class="page-header">
            <h1>Minhas reservas</h1>
            <p>Reservas feitas por voce</p>
        </div>

        <div id="lista" class="reservation-list"></div>

        <button onclick="window.location.href='home.html'" class="btn btn-secondary" type="button" style="margin-top: 18px;">
            Voltar
        </button>

        <p id="message" class="alert" style="display:none;"></p>
    </div>
</div>

<script>
    const lista = document.getElementById("lista");
    const money = new Intl.NumberFormat("pt-BR", {
        style: "currency",
        currency: "BRL"
    });

    function showMessage(text, success = false) {
        const message = document.getElementById("message");
        message.innerText = text;
        message.className = success ? "alert alert-success" : "alert alert-error";
        message.style.display = "block";
    }

    function formatDate(value) {
        return new Date(`${value}T00:00:00`).toLocaleDateString("pt-BR");
    }

    async function checkSession() {
        const response = await fetch("/session", {
            method: "GET",
            credentials: "include"
        });

        if (!response.ok) {
            window.location.href = "index.html";
            return;
        }
    }

    async function carregarReservas() {
        const response = await fetch("/reservas/minhas", { credentials: "include" });

        if (!response.ok) {
            showMessage(await response.text());
            return;
        }

        const reservas = await response.json();
        renderReservas(reservas);
    }

    function renderReservas(reservas) {
        lista.innerHTML = "";

        if (reservas.length === 0) {
            lista.innerHTML = "<p class='empty'>Nenhuma reserva encontrada.</p>";
            return;
        }

        reservas.forEach((reserva) => {
            const item = document.createElement("div");
            item.className = "reservation-item";

            const cancelButton = reserva.podeCancelar
                ? `<button class="btn btn-secondary" type="button" onclick="cancelarReserva(${reserva.id})">Cancelar reserva</button>`
                : "";

            // Lógica de Avaliação Injetada!
            let htmlAvaliacao = "";
            if (reserva.status === "Finalizada") {
                htmlAvaliacao = `
                    <button class="btn btn-secondary" style="margin-top: 10px; width: fit-content; padding: 8px 16px; font-size: 13px;" onclick="toggleAvaliacao(${reserva.id})">
                        ★ Avaliar Reserva
                    </button>

                    <div id="form-aval-${reserva.id}" style="display:none; margin-top: 12px; padding-top: 16px; border-top: 1px dashed #cbd5e1; animation: fadeIn 0.3s ease-out;">
                        <div class="form-group">
                            <label>Nota (1 a 5)</label>
                            <select id="nota-${reserva.id}" class="form-input">
                                <option value="5">5 - Excelente</option>
                                <option value="4">4 - Muito Bom</option>
                                <option value="3">3 - Bom</option>
                                <option value="2">2 - Ruim</option>
                                <option value="1">1 - Péssimo</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Comentário</label>
                            <textarea id="comentario-${reserva.id}" class="form-input" placeholder="Conte como foi sua experiência..."></textarea>
                        </div>
                        <button class="btn btn-primary" onclick="enviarAvaliacao(${reserva.id}, this)">Enviar Avaliação</button>
                        <p id="msg-aval-${reserva.id}" class="alert" style="display:none;"></p>
                    </div>
                `;
            }

            item.innerHTML = `
                <div class="reservation-header">
                    <div>
                        <div class="reservation-title">${reserva.produto}</div>
                        <div class="reservation-meta">${formatDate(reserva.dataInicio)} até ${formatDate(reserva.dataFim)}</div>
                    </div>
                    <span class="badge">${reserva.status}</span>
                </div>
                <div class="reservation-meta">${money.format(reserva.valorTotal)}</div>
                ${cancelButton}
                ${htmlAvaliacao}
            `;

            lista.appendChild(item);
        });
    }

    async function cancelarReserva(id) {
        const response = await fetch(`/reservas/${id}`, {
            method: "DELETE",
            credentials: "include"
        });

        if (!response.ok) {
            showMessage(await response.text());
            return;
        }

        showMessage("Reserva cancelada.", true);
        await carregarReservas();
    }

    // Funções de Avaliação
    function toggleAvaliacao(id) {
        const form = document.getElementById(`form-aval-${id}`);
        form.style.display = form.style.display === "block" ? "none" : "block";
    }

    async function enviarAvaliacao(id, btnElement) {
        const nota = document.getElementById(`nota-${id}`).value;
        const comentario = document.getElementById(`comentario-${id}`).value;
        const msgBox = document.getElementById(`msg-aval-${id}`);

        btnElement.classList.add("loading");
        btnElement.innerText = "Enviando...";
        msgBox.style.display = "none";

        try {
            const response = await fetch(`/avaliacoes/${id}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                credentials: "include",
                body: JSON.stringify({ nota: parseInt(nota), comentario: comentario })
            });

            if (response.ok) {
                msgBox.innerText = "Avaliação enviada com sucesso!";
                msgBox.className = "alert alert-success";
                msgBox.style.display = "block";
                btnElement.style.display = "none"; 
            } else {
                const erro = await response.text();
                msgBox.innerText = erro;
                msgBox.className = "alert alert-error";
                msgBox.style.display = "block";
            }
        } catch (err) {
            msgBox.innerText = "Erro ao conectar com o servidor.";
            msgBox.className = "alert alert-error";
            msgBox.style.display = "block";
        } finally {
            btnElement.classList.remove("loading");
            if (btnElement.style.display !== "none") btnElement.innerText = "Enviar Avaliação";
        }
    }

    checkSession();
    carregarReservas();
</script>
</body>
</html>
